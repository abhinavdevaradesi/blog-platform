<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #fff; color: #292929; font-family: Georgia, Cambria, "Times New Roman", Times, serif; font-size: 1.25rem; line-height: 1.8; }
        .meta-nav { font-family: -apple-system, sans-serif; font-size: 0.9rem; }
        .article-title { font-family: -apple-system, sans-serif; font-weight: 800; font-size: 2.8rem; line-height: 1.15; color: #1a1a1a; }
        .author-box { font-family: -apple-system, sans-serif; font-size: 0.95rem; background-color: #f8f9fa; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container meta-nav py-4 border-bottom mb-5">
    <a th:href="@{/}" class="text-decoration-none text-muted">← Back to Global Feed</a>
</div>

<div class="container" style="max-width: 740px;">
    <article>
        <h1 class="article-title mb-4" th:text="${post.title}">Post Title Title</h1>

        <div class="author-box d-flex align-items-center p-3 mb-5 text-secondary">
            <div>
                By
                <a th:href="@{/author/{id}(id=${post.author.id})}" class="text-dark fw-bold text-decoration-none" th:text="${post.author.fullName}">Author Name</a>
                | Contact: <span th:text="${post.author.email}">email</span>
            </div>
        </div>

        <div class="article-content" th:text="${post.content}">
            The raw paragraph text layout of the blog post goes here...
        </div>
    </article>
</div>

</body>
</html>
